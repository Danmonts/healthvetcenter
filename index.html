<!DOCTYPE html>
<html lang="pt-br">
<head>

<!-- Google Ads Conversion -->

  };
  gtag('event', 'conversion', {
      'send_to': 'AW-18092606734/huqNCN_B6KAcEI6KnbND',

  return false;

</script>

<script async src="https://www.googletagmanager.com/gtag/js?id=AW-18092606734"></script>
<script>
window.dataLayer = window.dataLayer || [];

gtag('js', new Date());

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Vet Center</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{font-family:Poppins,sans-serif;margin:0;background:#f5f5f5}
.section{padding:60px 20px;max-width:1000px;margin:auto}
.agendamento-box{display:flex;flex-direction:column;gap:15px;max-width:400px;margin:auto}
select,button{padding:12px;border-radius:10px;border:none}
button{background:#4caf8f;color:#fff;cursor:pointer}
button:disabled{opacity:.5}
</style>

</head>

<body>

<section class="section">
<h2 style="text-align:center">Agendamento Inteligente</h2>

<div class="agendamento-box">

<select id="animalSelect" onchange="atualizarServicos()">
<option value="">Tipo de animal</option>
<option value="Cão">Cão</option>
<option value="Gato">Gato</option>
<option value="Silvestre">Silvestre</option>
</select>

<select id="servicoSelect" onchange="mostrarMensagem()" disabled>
<option value="">Tipo de serviço</option>
</select>

<div id="mensagemInfo" style="display:none"></div>

<button id="btnWhats" onclick="enviarWhats()" disabled>
Falar no WhatsApp
</button>

</div>
</section>

<script>

const servicosPorAnimal={
"Cão":["Consulta Clínica","Vacinação","Castração","Banho e Tosa","Exames"],
"Gato":["Consulta Clínica","Vacinação","Castração","Exames"],
"Silvestre":["Consulta Clínica","Exames"]
};

const mensagensServico={
"Consulta Clínica":"Para realizar a consulta clínica, basta entrar em contato pelo WhatsApp.",
"Vacinação":"É necessário passar por consulta antes da vacinação.",
"Castração":"Necessário consulta e exames prévios.",
"Banho e Tosa":"Agende previamente pelo WhatsApp.",
"Exames":"Necessário avaliação clínica prévia."
};

function atualizarServicos(){
const animal=document.getElementById('animalSelect').value;
const servicoSelect=document.getElementById('servicoSelect');

servicoSelect.innerHTML='<option value="">Tipo de serviço</option>';
document.getElementById('mensagemInfo').style.display='none';
document.getElementById('btnWhats').disabled=true;

if(!animal){
servicoSelect.disabled=true;
return;
}

servicosPorAnimal[animal].forEach(servico=>{
const opt=document.createElement('option');
opt.value=servico;
opt.textContent=servico;
servicoSelect.appendChild(opt);
});

servicoSelect.disabled=false;
}

function mostrarMensagem(){
const servico=document.getElementById('servicoSelect').value;
const box=document.getElementById('mensagemInfo');

if(!servico){
box.style.display='none';
document.getElementById('btnWhats').disabled=true;
return;
}

box.textContent=mensagensServico[servico];
box.style.display='block';
document.getElementById('btnWhats').disabled=false;
}

function enviarWhats(){
const animal=document.getElementById('animalSelect').value;
const servico=document.getElementById('servicoSelect').value;

if(!animal||!servico)return;

const texto=`Olá! Gostaria de agendar atendimento para *${animal}*.\nServiço: *${servico}*.\n\n${mensagensServico[servico]} 🐾`;
const telefone='5511914925164';

const url=`https://wa.me/${telefone}?text=${encodeURIComponent(texto)}`;

// fallback
setTimeout(()=>{window.open(url,'_blank')},800);

// conversão
gtag_report_conversion(url);
}

</script>

</body>
</html>
